worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;

    # Don't advertise the nginx version in error pages or headers.
    server_tokens off;

    # Must be at least as large as MAX_UPLOAD_BYTES in docker-compose (50 MB).
    # A small buffer is added to account for multipart framing overhead.
    client_max_body_size 55m;

    # Keep-alive for upstream connections.
    keepalive_timeout 65;

    upstream api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-Frame-Options         "DENY"           always;
        add_header X-XSS-Protection        "1; mode=block"  always;
        add_header Referrer-Policy         "no-referrer"    always;

        # ── WebSocket — must appear before the catch-all location ─────────────
        # Handles GET /ws?token=... upgrades for real-time chat.
        location /ws {
            proxy_pass          http://api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;  # keep connection open for the session
            proxy_send_timeout  3600s;
        }

        # ── Uploaded files — served directly by nginx, bypassing the API ─────
        # The named volume "uploads" is mounted read-only here and read-write
        # in the api container. Nginx serves files much faster than FastAPI's
        # StaticFiles for large payloads.
        location /uploads/ {
            alias   /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── All other requests proxied to FastAPI ─────────────────────────────
        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";          # enable keep-alive to upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── To enable HTTPS, replace the server block above with: ────────────────
    #
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
    #
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     ... (same location blocks as above)
    # }
}
